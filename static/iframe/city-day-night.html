<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市夜景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            height: 300px;
            background: linear-gradient(180deg, 
                #0a0a0a 0%, 
                #1a1018 20%, 
                #2a1a25 40%, 
                #1a0f14 70%, 
                #000 100%);
        }

        #vignette {
            background: radial-gradient(ellipse at center, transparent 50%, #000 100%);
            position: absolute;
            top: 0;
            left: 50%;
            width: 100%;
            height: 300px;
            transform: translateX(-50%);
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="vignette"></div>

    <script>
        function screenWidth() {
            let w = document.body.offsetWidth;
            if (w < 600) w = 600;
            if (w > 1400 && w < 2000) w = 1400;
            if (w > 2000) w = 2000;
            return w;
        }

        const CANVAS_WIDTH = screenWidth();
        const CANVAS_HEIGHT = 300;
        const FRAME_TIME = 1000 / 16;

        const CAMERA = {
            x: 0,
            y: 6,
            z: 0,
            fov: 200,
            dist: 40,
            zSpeed: 0.006,
        };

        const VP_OFS = { x: 0.5, y: 0.45 };

        let c, ctx, output_c, output_ctx;
        let _t, _dt, _ft;

        const RNG = {
            seed: 1,
            random() {
                const x = Math.sin(RNG.seed++) * 10000;
                return x - Math.floor(x);
            },
            randomInRange(min, max) {
                return Math.floor(RNG.random() * (max - min + 1)) + min;
            }
        };

        const LIGHT_ROWS = 15;
        const LIGHT_ROW_DEPTH = 2.5;
        const LIGHT_SPACING = 1.2;
        const LIGHT_SIZE = 0.15;
        const LIGHT_SCATTER = 0.3;

        const BUILDING_ROWS = 40;
        const BUILDING_ROW_DEPTH = 0.8;
        const BUILDING_ROW_WIDTH = 70;
        const BUILDING_MIN_HEIGHT = 1.0;
        const BUILDING_MAX_HEIGHT = 4.5;
        const FADE_GRAY_VALUE = 15;
        const FADE_OFFSET = 0.25;

        const renderVars = {
            vPointX: 0,
            vPointY: 0,
            rowScreenX: 0,
            closestLightRow: 0,
            rowZ: 0,
            rowRelativeZ: 0,
            scalingFactor: 0,
            rowScreenWidth: 0,
            rowScreenHeight: 0,
            rowScreenY: 0,
            rowScreenLightSpacing: 0,
            rowLightCount: 0,
            lightSize: 0,
            lightHalfSize: 0,
            lightScreenX: 0,
            lightScreenY: 0,
            closestBuildingRow: 0,
            rowBuildingCount: 0,
            rowBuildingScreenWidth: 0,
            rowShade: 0,
            rowStyleString: '',
            lightData: [],
            buildingHeight: 0,
            buildingScreenHeight: 0,
            buildingScreenX: 0,
            buildingScreenY: 0,
            lightColor: 0,
        };

        function update() {
            _t = Date.now() * 0.001;
            CAMERA.z += CAMERA.zSpeed;
        }

        function drawStars() {
            RNG.seed = Math.floor(_t * 0.05);
            ctx.fillStyle = 'white';
            
            for (let i = 0; i < 30; i++) {
                const x = RNG.random() * c.width;
                const y = RNG.random() * c.height * 0.5;
                const size = RNG.random() > 0.8 ? 1.5 : 0.8;
                const alpha = RNG.random() * 0.6 + 0.2;
                
                ctx.globalAlpha = alpha;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;
        }

        function drawMoon() {
            const moonY = CANVAS_HEIGHT * 0.35;
            const moonX = c.width * 0.7;
            
            const gradient = ctx.createRadialGradient(
                moonX, moonY, 0,
                moonX, moonY, 60
            );
            gradient.addColorStop(0, 'rgba(180, 80, 80, 0.4)');
            gradient.addColorStop(0.5, 'rgba(120, 40, 40, 0.15)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, c.width, c.height);
            
            ctx.fillStyle = '#8B3A3A';
            ctx.beginPath();
            ctx.arc(moonX, moonY, 18, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#5a2020';
            ctx.beginPath();
            ctx.arc(moonX - 4, moonY - 2, 14, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawDistantLights() {
            renderVars.closestLightRow = Math.floor(CAMERA.z / LIGHT_ROW_DEPTH);

            for (let i = 0; i < LIGHT_ROWS; i++) {
                renderVars.rowZ = (renderVars.closestLightRow * LIGHT_ROW_DEPTH) + (LIGHT_ROW_DEPTH * i);
                renderVars.rowRelativeZ = renderVars.rowZ - CAMERA.z;

                if (renderVars.rowRelativeZ <= 0 || renderVars.rowRelativeZ > CAMERA.dist) continue;

                renderVars.scalingFactor = CAMERA.fov / renderVars.rowRelativeZ;
                renderVars.rowScreenY = CAMERA.y * renderVars.scalingFactor + renderVars.vPointY;

                if (renderVars.rowScreenY > c.height || renderVars.rowScreenY < 0) continue;

                renderVars.rowScreenLightSpacing = LIGHT_SPACING * renderVars.scalingFactor;
                renderVars.rowLightCount = c.width / renderVars.rowScreenLightSpacing;

                RNG.seed = renderVars.rowZ * 0.573;

                for (let j = 0; j < renderVars.rowLightCount; j++) {
                    renderVars.lightSize = RNG.random() * (LIGHT_SIZE * renderVars.scalingFactor);
                    if (renderVars.lightSize < 0.5) continue;
                    
                    renderVars.lightHalfSize = renderVars.lightSize * 0.5;

                    renderVars.lightScreenX = (j * renderVars.rowScreenLightSpacing) + 
                                            (RNG.random() * LIGHT_SCATTER * renderVars.scalingFactor) - 
                                            renderVars.lightHalfSize;
                    renderVars.lightScreenY = (renderVars.rowScreenY + 
                                            (RNG.random() * LIGHT_SCATTER) * renderVars.scalingFactor) - 
                                            renderVars.lightHalfSize;

                    if (renderVars.lightScreenX < 0 || renderVars.lightScreenX > c.width || 
                        renderVars.lightScreenY > c.height || renderVars.lightScreenY < 0) {
                        continue;
                    }

                    const colorRoll = RNG.random();
                    if (colorRoll > 0.92) {
                        ctx.fillStyle = '#ff4444';
                    } else if (colorRoll > 0.85) {
                        ctx.fillStyle = '#ffaa44';
                    } else if (colorRoll > 0.7) {
                        ctx.fillStyle = '#ffddaa';
                    } else {
                        ctx.fillStyle = '#666';
                    }
                    
                    const alpha = 1 - (renderVars.rowRelativeZ / CAMERA.dist);
                    ctx.globalAlpha = alpha * 0.8;
                    
                    ctx.fillRect((renderVars.rowScreenX + renderVars.lightScreenX), 
                                renderVars.lightScreenY, 
                                renderVars.lightSize, 
                                renderVars.lightSize);
                    ctx.globalAlpha = 1;
                }
            }
        }

        function drawBuildings() {
            renderVars.closestBuildingRow = Math.floor(CAMERA.z / BUILDING_ROW_DEPTH);

            for (let i = BUILDING_ROWS; i > 0; i--) {
                renderVars.rowZ = (renderVars.closestBuildingRow * BUILDING_ROW_DEPTH) + (BUILDING_ROW_DEPTH * i);
                renderVars.rowRelativeZ = renderVars.rowZ - CAMERA.z;

                if (renderVars.rowRelativeZ <= 0 || renderVars.rowRelativeZ > CAMERA.dist) continue;

                renderVars.scalingFactor = CAMERA.fov / renderVars.rowRelativeZ;
                renderVars.rowScreenWidth = BUILDING_ROW_WIDTH * renderVars.scalingFactor;
                renderVars.rowScreenHeight = BUILDING_MAX_HEIGHT * renderVars.scalingFactor;
                renderVars.rowScreenX = CAMERA.x * renderVars.scalingFactor + renderVars.vPointX - 
                                      (renderVars.rowScreenWidth * 0.5);
                renderVars.rowScreenY = CAMERA.y * renderVars.scalingFactor + renderVars.vPointY - 
                                      renderVars.rowScreenHeight;

                RNG.seed = renderVars.rowZ;
                renderVars.rowBuildingCount = RNG.randomInRange(12, 50);
                renderVars.rowBuildingScreenWidth = renderVars.rowScreenWidth / renderVars.rowBuildingCount;

                renderVars.rowShade = Math.max(0, Math.round(FADE_GRAY_VALUE * 
                    (renderVars.rowRelativeZ / CAMERA.dist - FADE_OFFSET)));
                
                const gray = 5 + renderVars.rowShade;
                renderVars.rowStyleString = `rgb(${gray},${gray * 0.9},${gray * 0.95})`;
                ctx.fillStyle = renderVars.rowStyleString;

                renderVars.lightData.length = 0;

                let gapSize = 0;
                let hasGap = false;
                
                for (let j = 0; j < renderVars.rowBuildingCount; j++) {
                    RNG.seed = renderVars.rowZ + j * 2.5;
                    
                    renderVars.buildingHeight = Math.max(BUILDING_MIN_HEIGHT, 
                        RNG.random() * BUILDING_MAX_HEIGHT * (0.7 + RNG.random() * 0.6));

                    renderVars.buildingScreenHeight = renderVars.buildingHeight * renderVars.scalingFactor;
                    renderVars.buildingScreenX = renderVars.rowScreenX + (j * renderVars.rowBuildingScreenWidth) + gapSize;
                    renderVars.buildingScreenY = renderVars.rowScreenY + renderVars.rowScreenHeight - 
                                               renderVars.buildingScreenHeight;

                    if (RNG.random() < 0.08 && !hasGap && j > 2 && j < renderVars.rowBuildingCount - 2) {
                        gapSize = renderVars.rowBuildingScreenWidth * (0.5 + RNG.random());
                        hasGap = true;
                    } else {
                        gapSize = 0;
                        hasGap = false;
                        
                        const width = Math.ceil(renderVars.rowBuildingScreenWidth);
                        const height = renderVars.buildingScreenHeight;
                        
                        if (renderVars.buildingScreenY + height > 0 && renderVars.buildingScreenX < c.width) {
                            ctx.fillRect(renderVars.buildingScreenX, 
                                        renderVars.buildingScreenY, 
                                        width, 
                                        height);
                            
                            if (RNG.random() < 0.15 && renderVars.buildingHeight > BUILDING_MAX_HEIGHT * 0.6 && 
                                renderVars.rowRelativeZ < CAMERA.dist * 0.6) {
                                const lightRoll = RNG.random();
                                if (lightRoll > 0.7) {
                                    renderVars.lightColor = '#ff4444';
                                } else if (lightRoll > 0.4) {
                                    renderVars.lightColor = '#ff8844';
                                } else {
                                    renderVars.lightColor = '#ffcc88';
                                }
                                
                                renderVars.lightSize = 2 + RNG.random() * 2;
                                
                                renderVars.lightData.push(renderVars.buildingScreenX + width * 0.5);
                                renderVars.lightData.push(renderVars.buildingScreenY - 1);
                                renderVars.lightData.push(renderVars.lightSize);
                                renderVars.lightData.push(renderVars.lightColor);
                            }
                        }
                    }
                }

                for (let j = 0; j < renderVars.lightData.length; j += 4) {
                    const x = renderVars.lightData[j];
                    const y = renderVars.lightData[j + 1];
                    const size = renderVars.lightData[j + 2];
                    const color = renderVars.lightData[j + 3];
                    
                    ctx.fillStyle = color;
                    ctx.fillRect(x - size * 0.5, y - size * 0.5, size, size);
                }
            }
        }

        function render() {
            renderVars.vPointX = Math.floor(c.width * VP_OFS.x);
            renderVars.vPointY = Math.floor(c.height * VP_OFS.y);
            renderVars.rowScreenX = CAMERA.x + renderVars.vPointX;

            ctx.clearRect(0, 0, c.width, c.height);
            output_ctx.clearRect(0, 0, output_c.width, output_c.height);

            drawStars();
            drawMoon();
            drawDistantLights();
            drawBuildings();

            output_ctx.drawImage(c, 0, 0);
        }

        function frame() {
            requestAnimationFrame(frame);
            _ft = Date.now();
            update();
            if (_ft - _dt > FRAME_TIME) {
                render();
                _dt = _ft;
            }
        }

        function start() {
            _dt = _ft = Date.now();

            c = document.createElement('canvas');
            ctx = c.getContext('2d');

            output_c = document.createElement('canvas');
            output_ctx = output_c.getContext('2d');

            output_c.width = c.width = CANVAS_WIDTH;
            output_c.height = c.height = CANVAS_HEIGHT;
            document.body.appendChild(output_c);

            frame();
        }

        start();

        window.addEventListener('resize', function() {
            const newWidth = screenWidth();
            if (newWidth !== CANVAS_WIDTH) {
                output_c.width = c.width = newWidth;
            }
        });
    </script>
</body>
</html>
